name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update. Defaults to v<package version> for manual runs."
        required: false
        type: string

permissions:
  contents: write

jobs:
  package:
    name: Build release artifacts
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            fakeroot \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            rpm

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build web frontend
        run: npm run web:build

      - name: Build Debian package
        run: npx tauri build -b deb

      - name: Build RPM package
        run: npx tauri build -b rpm

      - name: Build AppImage
        run: npm run desktop:build:appimage

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cachyos-theme-studio-release-artifacts
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          tag_name="${REQUESTED_TAG:-${GITHUB_REF_NAME}}"
          if [[ -z "$tag_name" || "$tag_name" == "main" ]]; then
            tag_name="v$(node -p "require('./package.json').version")"
          fi

          mapfile -t artifacts < <(
            find src-tauri/target/release/bundle \
              \( -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \) \
              -type f \
              -print
          )

          if [[ "${#artifacts[@]}" -eq 0 ]]; then
            echo "No release artifacts found." >&2
            exit 1
          fi

          if gh release view "$tag_name" >/dev/null 2>&1; then
            gh release upload "$tag_name" "${artifacts[@]}" --clobber
          else
            gh release create "$tag_name" "${artifacts[@]}" \
              --title "CachyOS Theme Studio ${tag_name}" \
              --notes "Automated release artifact build for CachyOS Theme Studio."
          fi
